name: Keep TesLink Alive

on:
  schedule:
    - cron: '0,8,16,24,32,40,48,56 0,6,8,10,12,14,16,18,20,22 * * *'
      timezone: 'Asia/Seoul'
    - cron: '4,12,20,28,36,44,52 7,9,11,13,15,17,19,21,23 * * *'
      timezone: 'Asia/Seoul'
  workflow_dispatch:

concurrency:
  group: keep-teslink-alive
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping health endpoint
        run: |
          curl -fsS \
            --retry 2 \
            --retry-delay 5 \
            --max-time 20 \
            -H "User-Agent: TesLink-KeepAlive/1.0" \
            "https://teslink.onrender.com/api/health"
