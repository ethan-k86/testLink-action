name: Keep TesLink Alive

on:
  schedule:
    - cron: '3,10,17,24,31,38,45,52,59 21-23 * * *'
    - cron: '3,10,17,24,31,38,45,52,59 0-16 * * *'
  workflow_dispatch:

concurrency:
  group: keep-teslink-alive
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping health endpoint
        run: |
          curl -fsS \
            --retry 2 \
            --retry-delay 5 \
            --max-time 20 \
            -H "User-Agent: TesLink-KeepAlive/1.0" \
            "https://teslink.onrender.com/api/health"
